<div class="space-y-4 m-5">

  <div *ngFor="let t of tasks"
       class="group p-5 rounded-xl border border-gray-100 bg-white shadow-sm 
              hover:shadow-lg hover:-translate-y-[2px] transition duration-300 flex justify-between items-center">

    
    <div class="space-y-1">

      
      <h3 class="text-base font-semibold text-gray-800 transition"
          [ngClass]="{'line-through text-gray-400': t.status === 'COMPLETED'}">
        {{t.title}}
      </h3>

      
      <div class="flex items-center gap-4 text-xs text-gray-500">

        <span>
          Due: {{t.dueDate}}
        </span>

       
        <span class="px-2 py-0.5 rounded-full text-xs font-medium"
              [ngClass]="{
                'bg-red-50 text-red-600': t.status === 'PENDING',
                'bg-green-50 text-green-600': t.status === 'COMPLETED'
              }">
          {{t.status}}
        </span>

      </div>

    </div>

    
    <div class="flex items-center gap-2">

      
      <button *ngIf="t.status === 'PENDING'"
              (click)="markCompleted(t)"
              class="px-3 py-1.5 text-sm font-medium rounded-lg 
                     bg-green-50 text-green-600 hover:bg-green-100 transition">
        Complete
      </button>

      
      <button (click)="deleteTask(t.id!)"
              class="px-3 py-1.5 text-sm font-medium rounded-lg 
                     bg-red-50 text-red-600 hover:bg-red-100 transition">
        Delete
      </button>

    </div>

  </div>

</div>
